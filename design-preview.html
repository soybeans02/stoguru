<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストグル - デザインプレビュー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; }

  .theme-selector {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #111; border-bottom: 1px solid #333;
    padding: 12px 16px; display: flex; gap: 8px; overflow-x: auto;
    align-items: center;
  }
  .theme-selector span { font-size: 12px; color: #888; white-space: nowrap; margin-right: 4px; }
  .theme-btn {
    padding: 6px 14px; border-radius: 20px; border: 2px solid #333;
    font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .theme-btn.active { border-color: currentColor; }

  .preview-grid {
    display: flex; gap: 24px; padding: 64px 24px 24px;
    overflow-x: auto; min-height: 100vh; align-items: flex-start;
  }

  .phone {
    width: 375px; min-width: 375px; height: 720px;
    border-radius: 40px; overflow: hidden; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
  }
  .phone-label {
    text-align: center; font-size: 11px; color: #888; margin-top: 8px; font-weight: 500;
  }

  /* ── Shared layout ── */
  .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .filter-bar { padding: 12px 16px; flex-shrink: 0; }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1.5px solid;
  }
  .card-area { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 8px 24px 0; }
  .card {
    width: 100%; max-width: 320px; border-radius: 20px; overflow: hidden;
    position: relative;
  }
  .card-img {
    height: 220px; display: flex; align-items: center; justify-content: center;
    font-size: 72px; position: relative;
  }
  .card-influencer {
    position: absolute; bottom: -14px; left: 16px;
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .card-body { padding: 24px 16px 16px; }
  .card-name { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
  .card-meta { font-size: 12px; opacity: 0.6; margin-bottom: 10px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .card-tag { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .card-link { font-size: 12px; font-weight: 500; text-decoration: none; }

  .buttons { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 20px 0 12px; flex-shrink: 0; }
  .btn-undo {
    width: 40px; height: 40px; border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .btn-action {
    width: 60px; height: 60px; border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    font-size: 24px; transition: transform 0.15s;
  }
  .btn-action:active { transform: scale(0.9); }
  .btn-spacer { width: 40px; }

  .bottom-nav {
    display: flex; justify-content: space-around; align-items: center;
    height: 56px; flex-shrink: 0; border-top: 1px solid;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10px; font-weight: 500; opacity: 0.4;
  }
  .nav-item.active { opacity: 1; }
  .nav-icon { width: 22px; height: 22px; }

  /* ── Theme: Coral Warm ── */
  .theme-coral .screen { background: #FFF9F5; }
  .theme-coral .filter-pill { border-color: #FFB088; color: #E85D2A; background: #FFF0E8; }
  .theme-coral .card { background: #fff; box-shadow: 0 8px 32px rgba(232,93,42,0.12); }
  .theme-coral .card-img { background: linear-gradient(135deg, #FFE8D6 0%, #FFDBC4 100%); }
  .theme-coral .card-influencer { background: #E85D2A; color: #fff; }
  .theme-coral .card-name { color: #1A1A1A; }
  .theme-coral .card-meta { color: #E85D2A; }
  .theme-coral .card-tag { background: #FFF0E8; color: #C74E20; }
  .theme-coral .card-link { color: #E85D2A; }
  .theme-coral .btn-undo { background: #FFF0E8; color: #ccc; }
  .theme-coral .btn-action.nope { background: #FFE8E8; color: #FF4D4D; }
  .theme-coral .btn-action.like { background: linear-gradient(135deg, #FF7A45, #FF5722); color: #fff; box-shadow: 0 4px 16px rgba(255,87,34,0.35); }
  .theme-coral .bottom-nav { background: #fff; border-color: #F0E8E2; }
  .theme-coral .nav-item { color: #C4A08A; }
  .theme-coral .nav-item.active { color: #E85D2A; }

  /* ── Theme: Deep Purple ── */
  .theme-purple .screen { background: #F8F5FF; }
  .theme-purple .filter-pill { border-color: #C4A8FF; color: #7C3AED; background: #F0E8FF; }
  .theme-purple .card { background: #fff; box-shadow: 0 8px 32px rgba(124,58,237,0.10); }
  .theme-purple .card-img { background: linear-gradient(135deg, #EDE5FF 0%, #DDD0FF 100%); }
  .theme-purple .card-influencer { background: #7C3AED; color: #fff; }
  .theme-purple .card-name { color: #1A1A1A; }
  .theme-purple .card-meta { color: #7C3AED; }
  .theme-purple .card-tag { background: #F0E8FF; color: #6D28D9; }
  .theme-purple .card-link { color: #7C3AED; }
  .theme-purple .btn-undo { background: #F0E8FF; color: #ccc; }
  .theme-purple .btn-action.nope { background: #FFE8E8; color: #FF4D4D; }
  .theme-purple .btn-action.like { background: linear-gradient(135deg, #A855F7, #7C3AED); color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,0.35); }
  .theme-purple .bottom-nav { background: #fff; border-color: #EDE5FF; }
  .theme-purple .nav-item { color: #B8A0D6; }
  .theme-purple .nav-item.active { color: #7C3AED; }

  /* ── Theme: Ocean Blue ── */
  .theme-ocean .screen { background: #F0F7FF; }
  .theme-ocean .filter-pill { border-color: #7CB8FF; color: #2563EB; background: #E8F2FF; }
  .theme-ocean .card { background: #fff; box-shadow: 0 8px 32px rgba(37,99,235,0.10); }
  .theme-ocean .card-img { background: linear-gradient(135deg, #DBEAFE 0%, #C5D9F8 100%); }
  .theme-ocean .card-influencer { background: #2563EB; color: #fff; }
  .theme-ocean .card-name { color: #1A1A1A; }
  .theme-ocean .card-meta { color: #2563EB; }
  .theme-ocean .card-tag { background: #E8F2FF; color: #1D4ED8; }
  .theme-ocean .card-link { color: #2563EB; }
  .theme-ocean .btn-undo { background: #E8F2FF; color: #ccc; }
  .theme-ocean .btn-action.nope { background: #FFE8E8; color: #FF4D4D; }
  .theme-ocean .btn-action.like { background: linear-gradient(135deg, #60A5FA, #2563EB); color: #fff; box-shadow: 0 4px 16px rgba(37,99,235,0.35); }
  .theme-ocean .bottom-nav { background: #fff; border-color: #DBEAFE; }
  .theme-ocean .nav-item { color: #93B4D4; }
  .theme-ocean .nav-item.active { color: #2563EB; }

  /* ── Theme: Matcha Green ── */
  .theme-matcha .screen { background: #F2F8F0; }
  .theme-matcha .filter-pill { border-color: #86D472; color: #2D7A1E; background: #E8F5E4; }
  .theme-matcha .card { background: #fff; box-shadow: 0 8px 32px rgba(45,122,30,0.10); }
  .theme-matcha .card-img { background: linear-gradient(135deg, #E2F3DC 0%, #D0EACA 100%); }
  .theme-matcha .card-influencer { background: #2D7A1E; color: #fff; }
  .theme-matcha .card-name { color: #1A1A1A; }
  .theme-matcha .card-meta { color: #2D7A1E; }
  .theme-matcha .card-tag { background: #E8F5E4; color: #256818; }
  .theme-matcha .card-link { color: #2D7A1E; }
  .theme-matcha .btn-undo { background: #E8F5E4; color: #ccc; }
  .theme-matcha .btn-action.nope { background: #FFE8E8; color: #FF4D4D; }
  .theme-matcha .btn-action.like { background: linear-gradient(135deg, #6BCB4A, #2D7A1E); color: #fff; box-shadow: 0 4px 16px rgba(45,122,30,0.35); }
  .theme-matcha .bottom-nav { background: #fff; border-color: #DAE8D4; }
  .theme-matcha .nav-item { color: #9AB890; }
  .theme-matcha .nav-item.active { color: #2D7A1E; }

  /* ── Theme: Dark Mode ── */
  .theme-dark .screen { background: #0A0A0A; }
  .theme-dark .filter-pill { border-color: #444; color: #FF8C42; background: #1A1A1A; }
  .theme-dark .card { background: #1A1A1A; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .theme-dark .card-img { background: linear-gradient(135deg, #1F1F1F 0%, #2A2A2A 100%); }
  .theme-dark .card-influencer { background: #FF8C42; color: #000; }
  .theme-dark .card-name { color: #F5F5F5; }
  .theme-dark .card-meta { color: #FF8C42; }
  .theme-dark .card-tag { background: #2A2A2A; color: #FFB380; }
  .theme-dark .card-link { color: #FF8C42; }
  .theme-dark .btn-undo { background: #1A1A1A; color: #666; }
  .theme-dark .btn-action.nope { background: #2A1A1A; color: #FF4D4D; }
  .theme-dark .btn-action.like { background: linear-gradient(135deg, #FFA060, #FF6B1A); color: #000; box-shadow: 0 4px 16px rgba(255,107,26,0.35); }
  .theme-dark .bottom-nav { background: #0A0A0A; border-color: #222; }
  .theme-dark .nav-item { color: #555; }
  .theme-dark .nav-item.active { color: #FF8C42; }

  /* ── Theme: Rose Pink ── */
  .theme-rose .screen { background: #FFF5F7; }
  .theme-rose .filter-pill { border-color: #FFA0B4; color: #E11D48; background: #FFE4EC; }
  .theme-rose .card { background: #fff; box-shadow: 0 8px 32px rgba(225,29,72,0.10); }
  .theme-rose .card-img { background: linear-gradient(135deg, #FFE0E8 0%, #FFD0DC 100%); }
  .theme-rose .card-influencer { background: #E11D48; color: #fff; }
  .theme-rose .card-name { color: #1A1A1A; }
  .theme-rose .card-meta { color: #E11D48; }
  .theme-rose .card-tag { background: #FFE4EC; color: #BE123C; }
  .theme-rose .card-link { color: #E11D48; }
  .theme-rose .btn-undo { background: #FFE4EC; color: #ccc; }
  .theme-rose .btn-action.nope { background: #F1F1F1; color: #999; }
  .theme-rose .btn-action.like { background: linear-gradient(135deg, #FB7185, #E11D48); color: #fff; box-shadow: 0 4px 16px rgba(225,29,72,0.35); }
  .theme-rose .bottom-nav { background: #fff; border-color: #FFE0E8; }
  .theme-rose .nav-item { color: #D4A0B0; }
  .theme-rose .nav-item.active { color: #E11D48; }

  /* SVG icons */
  .icon { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div class="theme-selector">
  <span>THEME:</span>
  <button class="theme-btn active" style="color:#E85D2A; background:#FFF0E8" onclick="show('coral')">Coral</button>
  <button class="theme-btn" style="color:#7C3AED; background:#F0E8FF" onclick="show('purple')">Purple</button>
  <button class="theme-btn" style="color:#2563EB; background:#E8F2FF" onclick="show('ocean')">Ocean</button>
  <button class="theme-btn" style="color:#2D7A1E; background:#E8F5E4" onclick="show('matcha')">Matcha</button>
  <button class="theme-btn" style="color:#FF8C42; background:#1A1A1A" onclick="show('dark')">Dark</button>
  <button class="theme-btn" style="color:#E11D48; background:#FFE4EC" onclick="show('rose')">Rose</button>
  <button class="theme-btn" style="color:#888; background:#222" onclick="show('all')">All</button>
</div>

<div class="preview-grid" id="grid"></div>

<script>
const themes = ['coral','purple','ocean','matcha','dark','rose'];

const svgHome = `<svg class="nav-icon" viewBox="0 0 24 24"><path class="icon" d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path class="icon" d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`;
const svgStock = `<svg class="nav-icon" viewBox="0 0 24 24"><path class="icon" d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>`;
const svgMap = `<svg class="nav-icon" viewBox="0 0 24 24"><path class="icon" d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle class="icon" cx="12" cy="10" r="3"/></svg>`;
const svgUser = `<svg class="nav-icon" viewBox="0 0 24 24"><circle class="icon" cx="12" cy="8" r="5"/><path class="icon" d="M20 21a8 8 0 0 0-16 0"/></svg>`;
const svgUndo = `<svg width="16" height="16" viewBox="0 0 24 24"><polyline class="icon" points="1 4 1 10 7 10"/><path class="icon" d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>`;

function makePhone(theme) {
  return `
  <div>
    <div class="phone theme-${theme}" id="phone-${theme}">
      <div class="screen">
        <div class="filter-bar">
          <span class="filter-pill">
            <svg width="14" height="14" viewBox="0 0 24 24"><line class="icon" x1="4" x2="4" y1="21" y2="14"/><line class="icon" x1="4" x2="4" y1="10" y2="3"/><line class="icon" x1="12" x2="12" y1="21" y2="12"/><line class="icon" x1="12" x2="12" y1="8" y2="3"/><line class="icon" x1="20" x2="20" y1="21" y2="16"/><line class="icon" x1="20" x2="20" y1="12" y2="3"/><line class="icon" x1="2" x2="6" y1="14" y2="14"/><line class="icon" x1="10" x2="14" y1="8" y2="8"/><line class="icon" x1="18" x2="22" y1="16" y2="16"/></svg>
            絞り込み
          </span>
        </div>
        <div class="card-area">
          <div class="card">
            <div class="card-img">
              🍝
              <div class="card-influencer">@umeda_gourmet</div>
            </div>
            <div class="card-body">
              <div class="card-name">トラットリア梅田</div>
              <div class="card-meta">6.4km · ¥1,500〜</div>
              <div class="card-tags">
                <span class="card-tag">イタリアン</span>
                <span class="card-tag">デート</span>
                <span class="card-tag">友達</span>
              </div>
              <a href="#" class="card-link">TikTokで見る →</a>
            </div>
          </div>
        </div>
        <div class="buttons">
          <button class="btn-undo">${svgUndo}</button>
          <button class="btn-action nope">✕</button>
          <button class="btn-action like">○</button>
          <div class="btn-spacer"></div>
        </div>
        <nav class="bottom-nav">
          <div class="nav-item active">${svgHome} ホーム</div>
          <div class="nav-item">${svgStock} ストック</div>
          <div class="nav-item">${svgMap} マップ</div>
          <div class="nav-item">${svgUser} アカウント</div>
        </nav>
      </div>
    </div>
    <div class="phone-label">${theme.charAt(0).toUpperCase() + theme.slice(1)}</div>
  </div>`;
}

function show(which) {
  const grid = document.getElementById('grid');
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (which === 'all') {
    grid.innerHTML = themes.map(t => makePhone(t)).join('');
  } else {
    grid.innerHTML = makePhone(which);
    grid.style.justifyContent = 'center';
  }
}

// Initial: show all
document.getElementById('grid').innerHTML = themes.map(t => makePhone(t)).join('');
</script>
</body>
</html>
