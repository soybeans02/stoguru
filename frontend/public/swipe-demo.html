<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ストグル - スワイプデモ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #fff;
    color: #333;
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
    user-select: none;
  }

  .app {
    display: flex; flex-direction: column; height: 100dvh;
    max-width: 430px; margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; flex-shrink: 0;
  }
  .filter-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 100px;
    border: 1px solid #d1d5db; background: none;
    font-size: 12px; font-weight: 500; color: #666;
    cursor: pointer;
  }
  .bell { font-size: 18px; color: #9ca3af; cursor: pointer; background: none; border: none; }

  /* Location tabs */
  .loc-tabs {
    display: flex; align-items: center; justify-content: center;
    gap: 0; flex-shrink: 0;
    padding: 0 16px 8px;
  }
  .loc-tab {
    flex: 1; max-width: 160px;
    padding: 7px 0; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600;
    background: none; color: #9ca3af;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    position: relative;
  }
  .loc-tab.active {
    color: #f97316; border-bottom-color: #f97316;
  }
  /* 目的地入力 */
  .dest-input-wrap {
    display: none; flex: 1; max-width: 160px; position: relative;
  }
  .dest-input-wrap.show { display: flex; }
  .dest-input {
    width: 100%; padding: 6px 28px 6px 8px;
    border: none; border-bottom: 2px solid #f97316;
    font-size: 13px; font-weight: 600; color: #333;
    background: none; outline: none;
    font-family: inherit;
  }
  .dest-input::placeholder { color: #d1d5db; font-weight: 500; }
  .dest-clear {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: #9ca3af; font-size: 14px; line-height: 1;
    padding: 4px;
  }
  /* サジェスト */
  .dest-suggestions {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    background: #fff; border-radius: 0 0 12px 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 50; max-height: 200px; overflow-y: auto;
  }
  .dest-suggestions.show { display: block; }
  .dest-sug-item {
    padding: 10px 12px; font-size: 13px; color: #333;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  .dest-sug-item:hover { background: #f9fafb; }
  .dest-sug-item svg { color: #9ca3af; flex-shrink: 0; }

  /* Card area */
  .card-area {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    padding: 0 12px; min-height: 0;
    overflow: hidden; position: relative;
  }
  .card-wrapper {
    position: relative; width: 100%; max-width: 400px;
    flex: 1; min-height: 0;
    max-height: calc(100vw * 1.45);
  }

  /* Card */
  .card {
    position: absolute; inset: 0;
    border-radius: 20px; overflow: hidden;
    will-change: transform, opacity;
    cursor: grab;
  }
  .card.active { z-index: 10; }
  .card.next { z-index: 5; transform: scale(0.97) translateY(4px); opacity: 0.5; }
  .card img.photo {
    width: 100%; height: 100%; object-fit: cover;
    pointer-events: none; display: block;
  }
  .card .emoji-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #e5e7eb, #d1d5db);
    font-size: 120px;
  }

  /* Bottom gradient */
  .card .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to top,
      rgba(0,0,0,0.88) 0%,
      rgba(0,0,0,0.5) 35%,
      transparent 55%
    );
    pointer-events: none;
  }

  /* Photo bars */
  .photo-bars {
    position: absolute; top: 6px; left: 10px; right: 10px;
    display: flex; gap: 3px; z-index: 8;
  }
  .bar { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.3); }
  .bar.active { background: rgba(255,255,255,0.9); }

  /* Top row (badge + video) */
  .top-row {
    position: absolute; top: 0; left: 0; right: 0; z-index: 6;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 14px 12px;
  }
  .influencer-badge {
    background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    color: #fff; padding: 3px 12px; border-radius: 100px;
    font-size: 11px; font-weight: 600; max-width: 120px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-decoration: none;
  }
  .video-btn {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* Info overlay */
  .info {
    position: absolute; bottom: 72px; left: 0; right: 0;
    padding: 0 20px; z-index: 10;
  }
  .info h3 {
    font-size: 21px; font-weight: 700; color: #fff !important;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    margin: 0 0 3px; line-height: 1.2;
  }
  .meta-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
  }
  .meta-row .meta {
    font-size: 12px; color: rgba(255,255,255,0.55); white-space: nowrap;
  }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 12px; font-weight: 500; color: #fff;
    padding: 4px 10px; border-radius: 100px;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .tag.genre { background: rgba(255,255,255,0.2); }
  .tag.scene { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8); }

  /* Swipe buttons (inside card) */
  .swipe-buttons {
    position: absolute; bottom: 14px; left: 0; right: 0; z-index: 20;
    display: flex; justify-content: center; align-items: center; gap: 20px;
  }
  .sw-btn {
    border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.15s;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .sw-btn:active { transform: scale(0.9); }
  .sw-btn.sm { width: 40px; height: 40px; background: rgba(255,255,255,0.85); }
  .sw-btn.md { width: 52px; height: 52px; }
  .sw-btn.disabled { pointer-events: none; }
  .sw-btn.disabled svg { opacity: 1; }

  /* Swipe labels */
  .swipe-label {
    position: absolute; top: 32px; z-index: 20;
    font-size: 24px; font-weight: 900;
    padding: 4px 16px; border-radius: 8px;
    border: 3px solid; opacity: 0; transition: opacity 0.1s;
    pointer-events: none;
  }
  .swipe-label.like { left: 24px; color: #4ade80; border-color: #4ade80; transform: rotate(-12deg); }
  .swipe-label.nope { right: 24px; color: #f87171; border-color: #f87171; transform: rotate(12deg); }
  .swipe-label.map { left: 50%; transform: translateX(-50%); color: #60a5fa; border-color: #60a5fa; }
  .swipe-label.show { opacity: 1; }

  /* Tab bar */
  .tab-bar {
    display: flex; justify-content: space-around; align-items: center;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom, 0px));
    border-top: 1px solid #f0f0f0; flex-shrink: 0;
    background: #fff;
  }
  .tab {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: none; border: none; cursor: pointer;
    font-size: 10px; color: #9ca3af; padding: 4px 12px;
  }
  .tab.active { color: #f97316; }
  .tab svg { width: 22px; height: 22px; }

  .card-counter { display: none; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->

    <button class="filter-btn">

      ホーム
    </button>
    <button class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      ストック
    </button>
    <button class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      マップ
    </button>
    <button class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      ソーシャル
    </button>
    <button class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      アカウント
    </button>
  </div>
</div>

<script>
// ── Mock data with Unsplash photos ──
const restaurants = [

    id: '6', name: 'スパイスカレー TADA',

    genre: 'ハンバーガー', scene: ['ひとり', '友達'],
    priceRange: '¥1,300〜', distance: '550m',
    influencer: { handle: '@burger_king_jp', platform: 'youtube' },
    videoUrl: '#',
    photoUrls: [
      'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=640&q=80',
      'https://images.unsplash.com/photo-1550547660-d9450f859349?w=640&q=80',
      'https://images.unsplash.com/photo-1586816001966-79b736744398?w=640&q=80',
    ],

];

// ── State ──
let idx = 0;
let photoIdx = 0;
let history = [];
let offsetX = 0, offsetY = 0;
let startX = 0, startY = 0;
let dragging = false;
const THRESHOLD = 80;

function currentR() { return restaurants[idx]; }
function nextR() { return restaurants[idx + 1]; }

// ── Render ──
function render() {
  const wrapper = document.getElementById('cardWrapper');
  wrapper.innerHTML = '';

  const counter = document.createElement('span');
  counter.className = 'card-counter';
  counter.textContent = `${idx + 1} / ${restaurants.length}`;
  wrapper.appendChild(counter);

  if (idx >= restaurants.length) {
    wrapper.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;">
        <div style="font-size:60px;font-weight:100;color:#d1d5db;">0</div>
        <div style="font-weight:600;font-size:16px;margin-top:4px;">全部見たよ</div>
        <div style="font-size:12px;color:#9ca3af;margin-top:4px;">また後でチェックしてね</div>
        <button onclick="idx=0;photoIdx=0;history=[];render();" style="margin-top:24px;padding:10px 24px;background:#f97316;color:#fff;border:none;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;">もう一度見る</button>
      </div>`;
    return;
  }

  // Next card (behind)
  const n = nextR();
  if (n) wrapper.appendChild(buildCard(n, false));
  // Active card
  wrapper.appendChild(buildCard(currentR(), true));
}

function buildCard(r, isActive) {
  const card = document.createElement('div');
  card.className = isActive ? 'card active' : 'card next';
  card.id = isActive ? 'activeCard' : 'nextCard';

  const photos = r.photoUrls || [];
  const pi = isActive ? photoIdx : 0;
  const count = photos.length;

  // Photo
  if (photos.length > 0) {
    const img = document.createElement('img');
    img.className = 'photo';
    img.src = photos[pi] || photos[0];
    img.alt = r.name;
    img.draggable = false;
    card.appendChild(img);
  }

  // Gradient
  const grad = document.createElement('div');
  grad.className = 'gradient';
  card.appendChild(grad);

  // Photo bars
  if (count > 1) {
    const bars = document.createElement('div');
    bars.className = 'photo-bars';
    for (let i = 0; i < count; i++) {
      const b = document.createElement('div');
      b.className = i === pi ? 'bar active' : 'bar';
      bars.appendChild(b);
    }
    card.appendChild(bars);
  }

  // Top row
  const top = document.createElement('div');
  top.className = 'top-row';
  top.innerHTML = `
    <span class="influencer-badge">${r.influencer.handle}</span>
    <button class="video-btn" onclick="event.stopPropagation()">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
    </button>
  `;
  card.appendChild(top);

  // Swipe labels
  card.innerHTML += `
    <div class="swipe-label like" id="labelLike">LIKE</div>
    <div class="swipe-label nope" id="labelNope">NOPE</div>
    <div class="swipe-label map" id="labelMap">MAP</div>
  `;

  // Info
  const info = document.createElement('div');
  info.className = 'info';
  const sceneTags = r.scene.map(s => `<span class="tag scene">${s}</span>`).join('');
  info.innerHTML = `
    <h3>${r.name}</h3>
    <div class="meta-row">
      <span class="meta">${r.distance}</span>
      <span class="meta">·</span>
      <span class="meta">${r.priceRange}</span>
    </div>
    <div class="tags">
      <span class="tag genre">${r.genre}</span>
      ${sceneTags}
    </div>
  `;
  card.appendChild(info);

  // Swipe buttons
  if (isActive) {
    const btns = document.createElement('div');
    btns.className = 'swipe-buttons';
    btns.innerHTML = `
      <button class="sw-btn sm ${history.length === 0 ? 'disabled' : ''}" onclick="event.stopPropagation();undo();">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button class="sw-btn md" onclick="event.stopPropagation();swipeAway('left');">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="sw-btn md" onclick="event.stopPropagation();swipeAway('right');">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#f97316" stroke="#f97316" stroke-width="0"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      </button>
      <button class="sw-btn sm" onclick="event.stopPropagation();swipeAway('up');">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </button>
    `;
    btns.addEventListener('mousedown', e => e.stopPropagation());
    btns.addEventListener('touchstart', e => e.stopPropagation());
    card.appendChild(btns);
  }

  return card;
}

// ── Swipe logic ──
function swipeAway(dir) {
  const card = document.getElementById('activeCard');
  if (!card) return;
  card.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
  if (dir === 'left') {
    card.style.transform = 'translateX(-120%) rotate(-15deg)';
  } else if (dir === 'right') {
    card.style.transform = 'translateX(120%) rotate(15deg)';
  } else {
    card.style.transform = 'translateY(-120%)';
  }
  card.style.opacity = '0';
  history.push({ idx, dir });
  setTimeout(() => { idx++; photoIdx = 0; render(); }, 300);
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  idx = last.idx;
  photoIdx = 0;
  render();
}

// ── Drag ──
function onStart(cx, cy) {
  const card = document.getElementById('activeCard');
  if (!card) return;
  dragging = true;
  startX = cx; startY = cy;
  offsetX = 0; offsetY = 0;
  card.style.transition = 'none';
}

function onMove(cx, cy) {
  if (!dragging) return;
  offsetX = cx - startX;
  offsetY = cy - startY;
  const card = document.getElementById('activeCard');
  if (!card) return;
  card.style.transform = `translate(${offsetX}px, ${offsetY}px) rotate(${offsetX * 0.06}deg)`;
  card.style.opacity = Math.max(0.3, 1 - Math.abs(offsetX) / 400);

  // Show labels
  const like = card.querySelector('.swipe-label.like');
  const nope = card.querySelector('.swipe-label.nope');
  const map = card.querySelector('.swipe-label.map');
  if (like) like.classList.toggle('show', offsetX > 30);
  if (nope) nope.classList.toggle('show', offsetX < -30);
  if (map) map.classList.toggle('show', offsetY < -40 && Math.abs(offsetY) > Math.abs(offsetX));
}

function onEnd() {
  if (!dragging) return;
  dragging = false;

  if (offsetY < -100 && Math.abs(offsetY) > Math.abs(offsetX)) {
    swipeAway('up');
  } else if (Math.abs(offsetX) > THRESHOLD) {
    swipeAway(offsetX > 0 ? 'right' : 'left');
  } else {
    // Snap back
    const card = document.getElementById('activeCard');
    if (card) {
      card.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
      card.style.transform = '';
      card.style.opacity = '1';
    }
    // Photo tap (small offset = tap)
    if (Math.abs(offsetX) < 5 && Math.abs(offsetY) < 5) {
      handlePhotoTap();
    }
  }
  offsetX = 0; offsetY = 0;
}

// ── Photo tap ──
let lastTapX = 0;
function handlePhotoTap() {
  const r = currentR();
  if (!r) return;
  const count = (r.photoUrls || []).length;
  if (count <= 1) return;

  const wrapper = document.getElementById('cardWrapper');
  const rect = wrapper.getBoundingClientRect();
  const half = rect.width / 2;
  if (lastTapX < rect.left + half) {
    photoIdx = Math.max(0, photoIdx - 1);
  } else {
    photoIdx = Math.min(count - 1, photoIdx + 1);
  }
  render();
}

// ── Events ──
document.addEventListener('mousedown', e => {
  lastTapX = e.clientX;
  const card = document.getElementById('activeCard');
  if (!card || !card.contains(e.target)) return;
  e.preventDefault();
  onStart(e.clientX, e.clientY);
});
document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
document.addEventListener('mouseup', () => onEnd());

document.addEventListener('touchstart', e => {
  lastTapX = e.touches[0].clientX;
  const card = document.getElementById('activeCard');
  if (!card || !card.contains(e.target)) return;
  onStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
document.addEventListener('touchmove', e => {
  e.preventDefault();
  onMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchend', () => onEnd());

// ── Location tab switch ──
const DEST_PLACES = [
  { name: '梅田', sub: '大阪市北区' },
  { name: '難波', sub: '大阪市中央区' },
  { name: '心斎橋', sub: '大阪市中央区' },
  { name: '天王寺', sub: '大阪市天王寺区' },
  { name: '渋谷', sub: '東京都渋谷区' },
  { name: '新宿', sub: '東京都新宿区' },
  { name: '中崎町', sub: '大阪市北区' },
  { name: '福島', sub: '大阪市福島区' },
  { name: '北浜', sub: '大阪市中央区' },
  { name: '京橋', sub: '大阪市都島区' },
];

function switchToCurrent() {
  document.getElementById('tabCurrent').classList.add('active');
  document.getElementById('tabDest').classList.remove('active');
  document.getElementById('tabDest').style.display = '';
  document.getElementById('destWrap').classList.remove('show');
  document.getElementById('destSuggestions').classList.remove('show');
}

function switchToDest() {
  document.getElementById('tabDest').classList.add('active');
  document.getElementById('tabCurrent').classList.remove('active');
  // タブを入力に変身
  document.getElementById('tabDest').style.display = 'none';
  document.getElementById('destWrap').classList.add('show');
  document.getElementById('destInput').focus();
}

function clearDest() {
  document.getElementById('destInput').value = '';
  document.getElementById('destSuggestions').classList.remove('show');
  switchToCurrent();
}

function onDestFocus() {
  // 空欄では出さない
  const q = document.getElementById('destInput').value;
  if (q) showSuggestions(q);
}

function onDestInput() {
  const q = document.getElementById('destInput').value;
  if (!q) { document.getElementById('destSuggestions').classList.remove('show'); return; }
  showSuggestions(q);
}

function showSuggestions(q) {
  const list = document.getElementById('destSuggestions');
  const filtered = DEST_PLACES.filter(p => p.name.includes(q) || p.sub.includes(q)).slice(0, 5);
  if (filtered.length === 0) { list.classList.remove('show'); return; }
  list.innerHTML = filtered.map(p => `
    <div class="dest-sug-item" onclick="selectDest('${p.name}')">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <div>
        <div style="font-weight:600;">${p.name}</div>
        <div style="font-size:11px;color:#9ca3af;">${p.sub}</div>
      </div>
    </div>
  `).join('');
  list.classList.add('show');
}

function selectDest(name) {
  document.getElementById('destInput').value = name;
  document.getElementById('destSuggestions').classList.remove('show');
}

// サジェスト外クリックで閉じる
document.addEventListener('click', e => {
  if (!e.target.closest('#locTabs')) {
    document.getElementById('destSuggestions').classList.remove('show');
  }
});

// ── Init ──
render();
</script>
