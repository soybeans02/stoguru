<!DOCTYPE html>

<head>
<style>
  body { font-family: system-ui; background: #f5f5f5; display: flex; flex-wrap: wrap; gap: 40px; padding: 40px; }
  .concept { background: white; border-radius: 16px; padding: 30px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .concept h3 { margin: 12px 0 4px; font-size: 14px; color: #666; }
  .row { display: flex; align-items: center; gap: 10px; justify-content: center; margin-top: 12px; }
  .row span { font-size: 20px; font-weight: 700; }
</style>

<body>

<!-- 1: オレンジ系 -->
<div class="concept">
  <h3>1: オレンジ × クロス</h3>
  <svg width="80" height="80" viewBox="0 0 80 80">
    <defs>
      <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#FF6B6B"/>
        <stop offset="100%" style="stop-color:#FF8E53"/>
      </linearGradient>
    </defs>
    <path d="M40 4C25.088 4 13 16.088 13 31c0 20.25 27 43 27 43s27-22.75 27-43C67 16.088 54.912 4 40 4z" fill="url(#g1)"/>
    <g transform="translate(40,40) rotate(-22)">
      <line x1="0" y1="-22" x2="0" y2="6" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="-3" y1="-22" x2="-3" y2="-14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="3" y1="-22" x2="3" y2="-14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <path d="M-3 -14 Q0 -10 3 -14" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(40,40) rotate(22)">
      <line x1="0" y1="-22" x2="0" y2="6" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M0 -22 Q5 -16 0 -10" fill="white" opacity="0.85"/>
    </g>
  </svg>
  <div class="row"><span style="color:#FF6B6B">ストグル</span></div>
</div>
