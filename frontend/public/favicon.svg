<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!--
    stoguru favicon — sidebar の .stg-brand__mark / LogoMark と同一の pin デザイン。
    オレンジグラデーションの角丸 squircle に teardrop pin（中央に小さな抜き穴）。
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FE9B3A"/>
      <stop offset="100%" stop-color="#FE8D28"/>
    </linearGradient>
  </defs>

  <!-- 角丸正方形（背景） -->
  <rect x="0" y="0" width="64" height="64" rx="16" ry="16" fill="url(#bg)"/>

  <!-- 中央の pin（白）— LogoMark と同 path・同サイズ比 -->
  <g transform="translate(13.6 13.6) scale(1.6)">
    <path d="M12 2c-4 0-7 3-7 7 0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7Z" fill="white"/>
    <circle cx="12" cy="9" r="3" fill="#FE8D28"/>
  </g>
</svg>
